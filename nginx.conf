# ============================================================
# Nginx SSL/TLS Reverse Proxy Configuration — EventHub TED2026
# ============================================================
# Τοποθετήστε αυτό το αρχείο στο:
#   /etc/nginx/sites-available/eventhub
# και κάντε symlink:
#   ln -s /etc/nginx/sites-available/eventhub /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name localhost eventhub.example.gr;

    # Redirect όλο το HTTP → HTTPS (απαίτηση εκφώνησης)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost eventhub.example.gr;

    # ── SSL/TLS Certificates ──────────────────────────────────
    # Development: self-signed (./ssl/)
    # Production: Let's Encrypt (certbot --nginx -d yourdomain.gr)
    ssl_certificate     /path/to/ted2026/backend/ssl/cert.pem;
    ssl_certificate_key /path/to/ted2026/backend/ssl/key.pem;

    # ── TLS Protocol & Cipher Hardening ──────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "strict-origin-when-cross-origin";

    # ── Frontend: Angular build ───────────────────────────────
    root /path/to/ted2026/frontend/dist/ted2026-frontend/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # Angular SPA routing
    }

    # ── Backend: NestJS REST API ──────────────────────────────
    location /api/ {
        proxy_pass         https://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       keep-alive;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        # Accept self-signed cert from NestJS (dev only — remove in production with trusted cert)
        proxy_ssl_verify   off;
    }

    # ── Uploaded Files ────────────────────────────────────────
    location /uploads/ {
        alias /path/to/ted2026/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ─────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
